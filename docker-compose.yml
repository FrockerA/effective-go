version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: subscriptions_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subscriptions
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: subscriptions_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=subscriptions
      - DB_SSLMODE=disable
      - APP_PORT=8080
    depends_on:
      - postgres

volumes:
  postgres_data: